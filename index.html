<!DOCTYPE html>
<html>
<head>
  <title>Day Counter</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: "Poppins", sans-serif;
      color: white;
      transition: background 2s ease;
      overflow: hidden;
    }

    /* SKY STATES */
    body.day {
      background: linear-gradient(#87CEEB, #B0E0E6);
    }

    body.night {
      background: linear-gradient(#0a0f2c, #1c1e3a);
    }

    /* CELESTIAL BODIES WRAPPERS (for arc motion) */
    .sun-wrapper, .moon-wrapper {
      position: absolute;
      width: 100%;
      height: 200px;
      top: 0;
      left: 0;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ARC ANIMATION */
    @keyframes arcAcross {
      0%   { transform: translateY(0) translateX(-40vw); }
      50%  { transform: translateY(80px) translateX(0vw); }
      100% { transform: translateY(0) translateX(40vw); }
    }

    .sun, .moon {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      position: absolute;
      opacity: 0;
      transition: opacity 1s ease;
      animation: none;
    }

    /* SUN LOOK */
    .sun {
      background: radial-gradient(circle, #ffdd55, #f5a623);
      box-shadow: 0 0 40px rgba(255, 200, 0, 0.8);
      transform: translateY(0) translateX(-40vw);
    }

    /* MOON LOOK */
    .moon {
      background: radial-gradient(circle, #ffffff, #dcdcdc);
      box-shadow: 0 0 30px rgba(210, 210, 255, 0.8);
      transform: translateY(0) translateX(-40vw);
    }

    /* VISIBILITY */
    body.day .sun { opacity: 1; }
    body.night .moon { opacity: 1; }

/* CLOUD BASE SHAPE */
.cloud {
  position: absolute;
  top: var(--cloud-top, 20%);
  left: -150px;
  width: 120px;
  height: 60px;
  background: #fff;
  border-radius: 50px;
  box-shadow:
    40px 10px 0 0 #fff,
    80px 15px 0 0 #fff;
  animation: cloudMove var(--cloud-speed, 24s) linear infinite;
}

@keyframes cloudMove {
  0% {
    transform: translateX(-200px);
  }
  100% {
    transform: translateX(calc(100vw + 200px));
  }
}


/* CLOUD GROUPS (multi-circle clouds) */
.cloud:before,
.cloud:after {
  content: "";
  position: absolute;
  background: white;
  border-radius: 50px;
}

.cloud {
  width: 120px;
  height: 50px;
}

.cloud:before {
  width: 80px;
  height: 50px;
  left: -40px;
  top: 0;
}

.cloud:after {
  width: 90px;
  height: 55px;
  right: -40px;
  top: -10px;
}

/* CLOUD MOTION */
@keyframes moveClouds {
  0%   { transform: translateX(-200px); }
  100% { transform: translateX(130vw); }
}

/* CLOUD POSITIONS & SPEEDS */
.cloud:nth-child(1) { top: 20%; animation-duration: 40s; }
.cloud:nth-child(2) { top: 35%; animation-duration: 55s; transform: scale(1.2); }
.cloud:nth-child(3) { top: 50%; animation-duration: 47s; transform: scale(0.9); }
.cloud:nth-child(4) { top: 60%; animation-duration: 62s; transform: scale(1.3); }
.cloud:nth-child(5) { top: 70%; animation-duration: 50s; transform: scale(1.1); }
.cloud:nth-child(6) { top: 25%; animation-duration: 58s; transform: scale(0.85); }


    /* COUNTER */
    #count {
      font-size: 120px;
      font-weight: bold;
      margin-bottom: 40px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #dayLabel {
  font-size: 40px;
  font-weight: 600;
  margin-bottom: -10px;
  z-index: 10;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    }

    /* DAY TRACKER BUTTON */
.day-tracker-btn {

  height: auto;
  width: 90px;
  position: absolute;
  top: 20px;
  right: 20px;

  background: rgba(255, 255, 255, 0.55);
  color: black;

  padding: 6px 14px;        /* much smaller, cleaner */
  font-size: 11px;
  font-weight: 700;

  border-radius: 16px;       /* smaller pill */
  border: 1px solid rgba(0, 0, 0, 0.15);

  cursor: pointer;
  white-space: nowrap;
  
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  box-shadow: 0 2px 6px rgba(0,0,0,0.18);

  transition: 
    transform 0.1s ease,
    box-shadow 0.2s ease,
    background 0.2s ease;
}

.day-tracker-btn:hover {
  background: rgba(255, 255, 255, 0.75);
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
}

.day-tracker-btn:active {
  transform: translateY(1px);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}



/* MODAL OVERLAY */

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  display: none;
  z-index: 1500;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

#datePickerModal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 350px;
  padding: 25px;
  background: white;
  border-radius: 12px;
  z-index: 9999;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

/* MODAL BOX */
.modal-content {
  background: white;
  color: black;
  padding: 30px;
  width: 300px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
}

.modal-content input {
  width: 90%;
  padding: 10px;
  margin: 15px 0;
  font-size: 18px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

#openDatePickerBtn {
  height: 35px;
  width: 120px;

  background: #ffffff8c;
  color: black;

  font-size: 11px;
  font-weight: 700;

  border-radius: 16px;       /* smaller pill */
  border: 1px solid rgba(0, 0, 0, 0.15);

  cursor: pointer;
  white-space: nowrap;
  
}

.save-btn,
.close-btn,
.reset-btn {
  width: 80%;
  height: 75px;
  padding: 4px;                 /* 50% of previous 8px */
  font-size: 12px;              /* scaled down */
  border-radius: 4px;           /* scaled down */
  margin-top: 6px;              /* scaled down */
  font-weight: 500;
  cursor: pointer;
}

/* Buttons in the Modal */
.save-btn {
  background: black;
  color: white;
  border: none;
}

.reset-btn {
  background: #c40b0b;
  color: white;
  border: none;
}

.modal-close-x {
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  color: #ffffff;
  opacity: 0.8;
  transition: opacity 0.2s ease;
}

.modal-close-x:hover {
  opacity: 1;
}

.date-input {
  width: 100%;
  padding: 6px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #999;
  font-size: 14px;
}


/*MAIN BUTTONS */
.btn-container {
  display: flex;
  gap: 20px;
  z-index: 10;
}

button {
  width: 90px;
  height: 90px;
  font-size: 50px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: white;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0px 6px 12px rgba(0,0,0,0.25);
}

/* COLORS */
.plus {
  background: white;
  color: black;       /* so the + symbol stays visible */
}

.minus {
  background: black;
  opacity: 0.35;      /* heavily reduced opacity */
  color: white;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0px 10px 18px rgba(0,0,0,0.35);
}

button:active {
  transform: scale(0.95);
}


/*Date Picker Modal Styles*/
.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.5);
  z-index: 900;
}

.modal-box {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 350px;
  background: #fff;
  padding: 20px;
  border-radius: 12px;

  z-index: 1000;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

.close-x {
  font-size: 22px;
  cursor: pointer;
  float: right;
}

  </style>
</head>

<body class="day">
  <div id="overlay"></div>


  <!-- SUN & MOON ARC PATH WRAPPERS -->
  <div class="sun-wrapper"><div class="sun"></div></div>
  <div class="moon-wrapper"><div class="moon"></div></div>

  <!-- MORE REALISTIC MULTI-CIRCLE CLOUDS -->
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>

  <!-- COUNTER -->
  <div id="dayLabel">Day</div>
  <div id="count">0</div>

  <!-- DAY TRACKER BUTTON -->
  <button id="dayTrackerBtn" class="day-tracker-btn">Day-Tracker</button>

  <!-- MODAL OVERLAY -->
  <div id="dayTrackerModal" class="modal">
  <div class="modal-content">
    <div class="modal-close-x" id="modalCloseX">✕</div>

    <h2>Set Total Days</h2>
    <button id="openDatePickerBtn">Pick a Date</button>
    <input type="number" id="totalDaysInput" placeholder="Enter number of days">
    <button id="saveDaysBtn" class="save-btn">Save</button>
    <button id="resetDaysBtn" class="reset-btn">Reset</button>
  </div>
  </div>


<!-- Overlay (background dimmer) -->
<div id="overlay" class="overlay"></div>

<!-- Date Picker Modal -->
<div id="datePickerModal" class="modal-box">
  <div class="modal-header">
    <span id="closeDatePicker" class="close-x">✕</span>
    <h2>Select a Date</h2>
  </div>

  <input type="date" id="targetDateInput" class="date-input">

  <button id="useDateBtn" class="save-btn">Use This Date</button>
</div>



  <!-- BUTTONS -->
  <div class="btn-container">
    <button class="minus" onclick="decrement()">−</button>
    <button class="plus" onclick="increment()">+</button>
  </div>

<script>
  const API = "";

  let isDay = true;

  // Load initial value
  fetch(`${API}/counter`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("count").innerText = data.counter;
    });

    let totalDays = null;

// DOM references
const modal = document.getElementById("dayTrackerModal");
const dayTrackerBtn = document.getElementById("dayTrackerBtn");
const saveBtn = document.getElementById("saveDaysBtn");
const closeModalBtn = document.getElementById("closeModalBtn");
const totalDaysInput = document.getElementById("totalDaysInput");
const counterDisplay = document.getElementById("count");

// Open modal
dayTrackerBtn.onclick = () => {
  modal.style.display = "flex";
};

// Close modal
const modalCloseX = document.getElementById("modalCloseX");

modalCloseX.onclick = () => {
  modal.style.display = "none";
};



//New date picker modal code
const OpenDatePickerBtn = document.getElementById("openDatePickerBtn");
const datePickerModal = document.getElementById("datePickerModal");
const overlay = document.getElementById("overlay");
const closeDatePicker = document.getElementById("closeDatePicker");

openDatePickerBtn.onclick = () => {
  overlay.style.display = "block";
  datePickerModal.style.display = "block";
};

closeDatePicker.onclick = () => {
  overlay.style.display = "none";
  datePickerModal.style.display = "none";
};

// Close if user taps outside modal
overlay.onclick = () => {
  overlay.style.display = "none";
  datePickerModal.style.display = "none";
};


// Reset total days
const resetDaysBtn = document.getElementById("resetDaysBtn");

resetDaysBtn.onclick = () => {
  totalDays = null;
  modal.style.display = "none";

  // Get just the raw count from server again
  fetch(`${API}/counter`)
    .then(res => res.json())
    .then(data => {
      counterDisplay.innerText = data.counter; // revert to plain number
    });
};


// Save total days
saveBtn.onclick = () => {
  const value = parseInt(totalDaysInput.value);

  if (!value || value <= 0) {
    alert("Please enter a valid number.");
    return;
  }

  totalDays = value;
  modal.style.display = "none";

  // Refresh display if counter already has a value
  const current = parseInt(counterDisplay.innerText);
  counterDisplay.innerText = `${current} / ${totalDays}`;
};


  // Use selected date to calculate days
const useDateBtn = document.getElementById("useDateBtn");
const targetDateInput = document.getElementById("targetDateInput");

useDateBtn.onclick = () => {
  const targetDate = new Date(targetDateInput.value);
  const today = new Date();

  if (isNaN(targetDate) || targetDate <= today) {
    alert("Please pick a future date.");
    return;
  }

  const diffTime = targetDate - today;
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  document.getElementById("count").innerText = diffDays;

  // optional: store on backend
  fetch(`${API}/counter/set`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ counter: diffDays })
  });

  datePickerModal.style.display = "none";
};



  function animateSunMoon() {
    const sun = document.querySelector(".sun");
    const moon = document.querySelector(".moon");

    // Reset animations so they replay every cycle
    sun.style.animation = "none";
    moon.style.animation = "none";

    void sun.offsetWidth; 
    void moon.offsetWidth;

    sun.style.animation = "arcAcross 6s ease-in-out forwards";
    moon.style.animation = "arcAcross 6s ease-in-out forwards";
  }

  function toggleSky() {
    isDay = !isDay;
    document.body.className = isDay ? "day" : "night";
    animateSunMoon();
  }

  function fullDayCycle() {
  runDayCycle(() => {
    runNightCycle(() => {
      // After night ends → return to day state
      document.body.className = "day";

      // Reset sun/moon positions and visibility
      const sun = document.querySelector(".sun");
      const moon = document.querySelector(".moon");

      sun.style.animation = "none";
      moon.style.animation = "none";

      sun.style.opacity = 1;
      moon.style.opacity = 0;

      sun.style.transform = "translateY(0) translateX(-40vw)";
      moon.style.transform = "translateY(0) translateX(-40vw)";
    });
  });
}


function runDayCycle(callback) {
  document.body.className = "day";

  const sun = document.querySelector(".sun");

  sun.style.animation = "none";
  sun.offsetHeight;

  sun.style.animation = "arcAcross 2s ease-in-out forwards";
  sun.style.opacity = 1;

  setTimeout(() => {
    sun.style.opacity = 0;
    if (callback) callback();
  }, 2000); // changed from 6000
}


function runNightCycle(callback) {
  document.body.className = "night";

  const moon = document.querySelector(".moon");

  moon.style.animation = "none";
  moon.offsetHeight;

  moon.style.animation = "arcAcross 2s ease-in-out forwards";
  moon.style.opacity = 1;

  setTimeout(() => {
    moon.style.opacity = 0;
    if (callback) callback();
  }, 2000); // changed from 6000
}

  function increment() {
  fetch(`${API}/counter/increment`, { method: "POST" })
    .then(res => res.json())
    .then(data => {
  const current = data.counter;

  if (totalDays) {
    counterDisplay.innerText = `${current} / ${totalDays}`;
  } else {
    counterDisplay.innerText = current;
  }

  fullDayCycle();
});

  }


  function decrement() {
    fetch(`${API}/counter/decrement`, { method: "POST" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("count").innerText = data.counter;
      });
  }
</script>

</body>
</html>
